<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe with AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4"
  >
    <h1 class="text-4xl font-bold mb-8 text-cyan-400">
        🦀 Tic Tac Toe - <span id="level" style="text-transform: capitalize;"></span>
    </h1>

    <div
      id="board"
      class="grid grid-cols-3 gap-2 bg-slate-700 p-2 rounded-lg shadow-2xl"
    ></div>

    <div class="mt-8 flex flex-col items-center gap-4">
      <p id="status" class="text-xl font-semibold tracking-wide">
        Your Turn (X)
      </p>
      <button
        id="reset"
        class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-full transition-all font-bold"
      >
        Reset Game
      </button>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
